<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<meta name="description"
content="Accessible semantic portfolio website">

<meta name="keywords"
content="HTML5, Accessibility, Portfolio">

<meta name="author"
content="Shyam">

<title>Accessible Portfolio</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<a class="skip-link"
href="#main-content">
Skip to Content
</a>

<header role="banner">

<nav
aria-label="Primary Navigation">

<ul>

<li><a href="#home">Home</a></li>

<li><a href="#about">About</a></li>

<li><a href="#projects">Projects</a></li>

<li><a href="#contact">Contact</a></li>

</ul>

</nav>

</header>

<main id="main-content">

<section id="home">

<h1>
My Portfolio
</h1>

<p>
Accessible Semantic HTML5 Website
</p>

</section>

<section id="about">

<h2>
About Me
</h2>

<p>
Student interested in web development.
</p>

</section>

<section id="projects">

<h2>
Projects
</h2>

<article>

<h3>
Portfolio Website
</h3>

<p>
Built using semantic HTML5.
</p>

</article>

</section>

<section id="contact">

<h2>
Contact
</h2>

<form
aria-label="Contact Form">

<label for="name">
Name
</label>

<input
id="name"
type="text"
required>

<label for="email">
Email
</label>

<input
id="email"
type="email"
required>

<label for="message">
Message
</label>

<textarea
id="message"
required>
</textarea>

<button type="submit">

Submit

</button>

</form>

</section>

</main>

<footer>

<p>

© 2026 YOGITHA

</p>

</footer>

</body>

</html>
